<!-- Мэдээлэл харуулах Цонх (Modal) -->
<div id="artistModal" class="modal">
    <div class="modal-content glass">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div id="modalBody">
            <!-- Энд мэдээлэл JavaScript-ээр солигдож гарч ирнэ -->
        </div>
    </div>
</div>
<script>
const artistData = {
    vinci: {
        title: "Leonardo da Vinci",
        bio: "Сэргэн мандалтын үеийн хамгийн суут ухаантан, зохион бүтээгч, зураач. Түүний 'Мона Лиза' бүтээл нь дэлхийн хамгийн алдартай зураг юм.",
        works: ["Мона Лиза", "Сүүлчийн оройн зоог"]
    },
    gogh: {
        title: "Vincent van Gogh",
        bio: "Голланд зураач, пост-импрессионизмын төлөөлөгч. Сэтгэл хөдлөлөө багс ашиглан маш хүчтэй илэрхийлдэг байсан.",
        works: ["Одод түгсэн шөнө", "Наранцэцэг"]
    }
};

function openArtist(id) {
    const data = artistData[id];
    const modal = document.getElementById("artistModal");
    const body = document.getElementById("modalBody");

    body.innerHTML = `
        <h1 style="color:var(--primary)">${data.title}</h1>
        <p style="margin-top:20px; font-size:18px;">${data.bio}</p>
        <h3 style="margin-top:30px;">Гол бүтээлүүд:</h3>
        <ul>${data.works.map(w => `<li>${w}</li>`).join('')}</ul>
    `;

    modal.style.display = "block";
}

function closeModal() {
    document.getElementById("artistModal").style.display = "none";
}

// Цонхны гадна дарахад хаагдах
window.onclick = function(event) {
    const modal = document.getElementById("artistModal");
    if (event.target == modal) {
        closeModal();
    }
}
</script>
</body>
